<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

    <!-- メインCSS（遅延読み込み＋高速化） -->
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="icon" href="/assets/images/favicon.png" type="image/png">
  <script>
    if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
      window.location.href = "mobile.html";
    }
  </script>
</head>
<body>
  <!-- ヘッダー読み込み -->
  <div id="header-placeholder"></div>
  <div class="container">
    <!-- 左カラム読み込み -->
    <div id="sidebar-left-placeholder"></div>
<!-- 中央カラム -->
    <main class="content">
    <h2>Welcome!</h2>
    <p>ようこそ、フリーBGM配布サイト<br>
      《りたるだんどな日々》へ。</p>
    <p>フリーBGMの配信やブログ更新情報、<br>
      YouTubeの最新動画情報などをお届けします。</p><br>

      <p>りたるだんどが運営する個人サイトです。商用利用可能のBGMを配布しています。</p>

<p>
  <a href="mobile.html?page=index">モバイル版</a> | 
  <a href="index.html">デスクトップ版</a>
</p>
  <a href="/bgm/">フリーBGM一覧はこちら！！！</a>
  </main>
    <!-- 右カラム読み込み -->
    <div id="sidebar-right-placeholder"></div>
  </div>
  <!-- フッター読み込み -->
  <div id="footer-placeholder"></div>
  <!-- 共通パーツ読み込み用JavaScript -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // HTMLファイルを読み込む関数
      function loadHTML(elementId, filePath) {
        fetch(filePath)
          .then(response => response.text())
          .then(data => {
            document.getElementById(elementId).innerHTML = data;
          })
          .catch(error => console.error(`Error loading ${filePath}:`, error));
      }
      // 各パーツを読み込む
      loadHTML('header-placeholder', 'includes/header.html');
      loadHTML('sidebar-left-placeholder', 'includes/sidebar-left.html');
      loadHTML('sidebar-right-placeholder', 'includes/sidebar-right.html');
      loadHTML('footer-placeholder', 'includes/footer.html');
    });
  </script>
</body>
