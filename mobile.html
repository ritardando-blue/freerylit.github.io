<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>りたるだんどな日々 - フリーBGM</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="background/pageimages/fabikonn.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff8f0;
}

/* ヘッダー */
header {
  height: 100px;
  background: url('background/pageimages/header.webp') center/cover no-repeat;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
}

/* ハンバーガー */
.hamburger {
  position: fixed;
  top: 105px;
  left: 10px;
  font-size: 26px;
  background: none;
  border: none;
  z-index: 2000;
}

/* ✅ メニュー（フォント統一） */
.menu {
  display: none;
  position: fixed;
  top: 100px;
  width: 100%;
  background: #f2c474 url('background/pageimages/pattern.webp');
  padding: 20px;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

.menu a {
  display: block;
  margin: 10px 0;
  text-decoration: none;
  color: #612d00;
  font-weight: bold;
}

/* 本文 */
#mobileContent {
  margin-top: 120px;
  padding: 20px;
}

/* ✅ 白エリア */
.mobile-sidebar {
  width: 100%;
  background: #fff;
  padding: 10px 0;
}

/* ✅ 折りたたみ */
details {
  margin: 0;
}

/* ✅ 矢印消し */
summary {
  list-style: none;
  text-align: center;
  font-weight: bold;
  color: #d35400;
  padding: 10px 0;
}
summary::-webkit-details-marker {
  display: none;
}

/* ✅ 中央軸 */
.mobile-sidebar-inner {
  max-width: 320px;
  margin: 0 auto;
}

/* ✅ 最重要：PCの影響を完全遮断 */
#sidebar-inner,
#sidebar-inner * {
  font-family: Arial, sans-serif !important;
  text-align: center !important;
  margin-left: auto !important;
  margin-right: auto !important;
}

/* アイコン */
#sidebar-inner img {
  display: block;
  margin: 0 auto 12px;
  max-width: 100px;
}

/* ✅ リストだけ戻す */
#sidebar-inner ul {
  text-align: left !important;
  max-width: 260px;
}

/* ✅ footer余白対策（これが核心） */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

#footer-placeholder {
  margin-top: auto;
}

/* footer */
footer {
  background: #d35400;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header></header>

<button class="hamburger" onclick="toggleMenu()">☰</button>

<div class="menu" id="menu">
  <a href="mobile.html?page=index">HOME</a>
  <a href="mobile.html?page=bgm%2Findex.html">フリーBGM</a>
  <a href="mobile.html?page=blog%2Findex.html">Blog</a>
  <a href="mobile.html?page=profile.html">Profile</a>
  <a href="mobile.html?page=contact.html">Contact</a>
  <a href="mobile.html?page=terms.html">利用規約</a>
</div>

<main id="mobileContent"></main>

<div class="mobile-sidebar">
  <details>
    <summary>プロフィール・更新履歴を見る</summary>

    <div class="mobile-sidebar-inner">
      <div id="sidebar-inner"></div>
    </div>

  </details>
</div>

<div id="footer-placeholder"></div>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display =
    menu.style.display === "block" ? "none" : "block";
}

/* 読み込み */
function loadHTML(id, url) {
  fetch(url)
    .then(res => res.text())
    .then(html => document.getElementById(id).innerHTML = html);
}

/* 本文 */
const params = new URLSearchParams(location.search);
const page = params.get("page") || "index";

fetch("./" + page)
  .then(res => res.text())
  .then(html => {
    const doc = new DOMParser().parseFromString(html, "text/html");
    const content = doc.querySelector(".content") || doc.body;
    document.getElementById("mobileContent").innerHTML = content.innerHTML;
  });

/* sidebar */
loadHTML("sidebar-inner", "background/sidebar-right.html");

/* footer */
loadHTML("footer-placeholder", "background/footer.html");
</script>

</body>
</html>
