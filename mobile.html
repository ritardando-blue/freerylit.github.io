<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>りたるだんどな日々 - フリーBGM</title>

<link rel="stylesheet" href="style.css">
link rel="icon" href="background/pageimages/fabikonn.png" type="image/png">

<style>
html, body {
  height: 100%;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff8f0;
  display: flex;
  flex-direction: column;
}

/* 本文が必ず伸びる */
#mobileContent {
  margin-top: 120px;
  padding: 20px;
  flex: 1; /* ←これが本質 */
}

/* sidebar */
.mobile-sidebar {
  background: #fff;
  padding: 10px 0;
}

/* footerを一番下へ */
#footer-placeholder {
  margin-top: auto;
}

/* footer */
footer {
  background: #d35400;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header></header>

<button class="hamburger" onclick="toggleMenu()">☰</button>

<div class="menu" id="menu">
  <a href="mobile.html?page=index">HOME</a>
  <a href="mobile.html?page=bgm%2Findex.html">フリーBGM</a>
  <a href="mobile.html?page=blog%2Findex.html">Blog</a>
  <a href="mobile.html?page=profile.html">Profile</a>
  <a href="mobile.html?page=contact.html">Contact</a>
  <a href="mobile.html?page=terms.html">利用規約</a>
</div>

<main id="mobileContent"></main>

<div class="mobile-sidebar">
  <details>
    <summary>プロフィール・更新履歴を見る</summary>

    <div class="mobile-sidebar-inner">
      <div id="sidebar-inner"></div>
    </div>

  </details>
</div>

<div id="footer-placeholder"></div>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  const btn = document.querySelector(".hamburger");

  if (menu.style.display === "block") {
    menu.style.display = "none";
    btn.style.color = "#d35400"; // 閉じた
  } else {
    menu.style.display = "block";
    btn.style.color = "#612d00"; // 開いた
  }
}

/* HTML読み込み */
function loadHTML(id, url) {
  fetch(url)
    .then(res => res.text())
    .then(html => document.getElementById(id).innerHTML = html);
}

/* 本文 */
const params = new URLSearchParams(location.search);
const page = params.get("page") || "index";

fetch("./" + page)
  .then(res => res.text())
  .then(html => {
    const doc = new DOMParser().parseFromString(html, "text/html");
    const content = doc.querySelector(".content") || doc.body;
    document.getElementById("mobileContent").innerHTML = content.innerHTML;
  });

/* sidebar */
loadHTML("sidebar-inner", "background/sidebar-right.html");

/* footer */
loadHTML("footer-placeholder", "background/footer.html");
</script>

</body>
</html>
